name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings" # Treat warnings as errors for strict CI

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & Format
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # Job 2: Unit & Integration Tests
  # ---------------------------------------------------------------------------
  test:
    name: Test Suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Tests
        run: cargo test --workspace --all-features --verbose

  # ---------------------------------------------------------------------------
  # Job 3: Build Release Binaries & Upload Artifacts
  # ---------------------------------------------------------------------------
  build:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint, test] # Only build if lint and test pass
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: heimwatch-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-name: heimwatch-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: heimwatch-windows-x86_64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }} --bin heimwatch

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: target/$${{ matrix.target }}/release/heimwatch$${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          retention-days: 30
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 4: PR Status Check (Optional but recommended)
  # ---------------------------------------------------------------------------
  pr-check:
    name: PR Check
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    steps:
      - name: Check if all jobs passed
        if: ${{ needs.lint.result != 'success' || needs.test.result != 'success' || needs.build.result != 'success' }}
        run: exit 1
      - name: All checks passed
        run: echo "✅ All CI checks passed!"
